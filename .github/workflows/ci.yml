name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Java backend tests
    runs-on: ubuntu-latest
    env:
      DEVCONTEXT_LLM_PROVIDER: mock
      DEVCONTEXT_VECTOR_PROVIDER: jdbc
      GEMINI_API_KEY: ""
      DEEPSEEK_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn test

  frontend:
    name: React frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run frontend:build

  docs-guard:
    name: Private docs guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify private docs are not tracked
        shell: bash
        run: |
          set -euo pipefail
          blocked_paths="$(git ls-files -- AGENTS.md docs .ai)"
          if [[ -n "$blocked_paths" ]]; then
            printf 'Private/local management docs must stay ignored, but these files are tracked:\n%s\n' "$blocked_paths"
            exit 1
          fi

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    env:
      DEVCONTEXT_LLM_PROVIDER: mock
      DEVCONTEXT_VECTOR_PROVIDER: jdbc
      GEMINI_API_KEY: ""
      DEEPSEEK_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend and frontend images
        run: docker compose build backend frontend

  compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: docker-compose.smoke.yml
      COMPOSE_PROJECT_NAME: devcontext-smoke-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write smoke Compose file
        shell: bash
        run: |
          cat > docker-compose.smoke.yml <<'YAML'
          services:
            backend:
              build:
                context: .
                dockerfile: Dockerfile
              ports:
                - "18080"
              environment:
                SPRING_DATASOURCE_URL: jdbc:sqlite:/app/data/devcontext.sqlite
                DEVCONTEXT_LLM_PROVIDER: mock
                DEVCONTEXT_VECTOR_PROVIDER: qdrant
                QDRANT_BASE_URL: http://qdrant:6333
                GEMINI_API_KEY: ""
                DEEPSEEK_API_KEY: ""
                QDRANT_API_KEY: ""
              volumes:
                - devcontext-data:/app/data
                - ./workspace/projects:/workspace/projects
              depends_on:
                qdrant:
                  condition: service_healthy
              healthcheck:
                test: ["CMD-SHELL", "curl -fsS http://localhost:18080/api/health >/dev/null"]
                interval: 10s
                timeout: 5s
                retries: 12
                start_period: 30s

            frontend:
              build:
                context: ./frontend
                dockerfile: Dockerfile
              ports:
                - "80"
              depends_on:
                backend:
                  condition: service_healthy
              healthcheck:
                test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null"]
                interval: 10s
                timeout: 5s
                retries: 12
                start_period: 10s

            qdrant:
              image: qdrant/qdrant:v1.18.1
              ports:
                - "6333"
                - "6334"
              volumes:
                - qdrant-data:/qdrant/storage
              healthcheck:
                test: >
                  timeout 5 bash -ec 'exec 3<>/dev/tcp/127.0.0.1/6333;
                  printf "GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3;
                  grep -q "200 OK" <&3'
                interval: 10s
                timeout: 5s
                retries: 12
                start_period: 10s

          volumes:
            devcontext-data:
            qdrant-data:
          YAML

      - name: Clean up previous Compose stack
        run: docker compose down -v --remove-orphans

      - name: Start Compose stack
        run: docker compose up -d --build

      - name: Verify smoke endpoints
        shell: bash
        run: |
          set -euo pipefail
          backend_addr="$(docker compose port backend 18080 | sed -e 's/^0\.0\.0\.0/127.0.0.1/' -e 's/^\[::\]/127.0.0.1/')"
          frontend_addr="$(docker compose port frontend 80 | sed -e 's/^0\.0\.0\.0/127.0.0.1/' -e 's/^\[::\]/127.0.0.1/')"
          qdrant_addr="$(docker compose port qdrant 6333 | sed -e 's/^0\.0\.0\.0/127.0.0.1/' -e 's/^\[::\]/127.0.0.1/')"
          backend_url="http://${backend_addr}/api/health"
          frontend_url="http://${frontend_addr}"
          qdrant_url="http://${qdrant_addr}/healthz"
          echo "Backend smoke URL: ${backend_url}"
          echo "Frontend smoke URL: ${frontend_url}"
          echo "Qdrant smoke URL: ${qdrant_url}"
          for attempt in {1..90}; do
            if curl -fsS "${backend_url}" > backend-health.json \
              && grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"' backend-health.json \
              && grep -Eq '"llmProvider"[[:space:]]*:[[:space:]]*"mock"' backend-health.json \
              && grep -Eq '"llmClient"[[:space:]]*:[[:space:]]*"MockLlmClient"' backend-health.json \
              && curl -fsS "${frontend_url}" > frontend-home.html \
              && curl -fsS "${qdrant_url}" > qdrant-health.txt; then
              cat backend-health.json
              cat qdrant-health.txt
              exit 0
            fi
            echo "Waiting for Compose smoke endpoints, attempt ${attempt}/90..."
            docker compose ps
            sleep 2
          done
          echo "Compose smoke endpoints did not become ready."
          exit 1

      - name: Show Compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Clean up Compose stack
        if: always()
        run: docker compose down -v --remove-orphans
