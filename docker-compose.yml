services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devcontext-backend
    ports:
      - "18080:18080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlite:/app/data/devcontext.sqlite
      DEVCONTEXT_LLM_PROVIDER: ${DEVCONTEXT_LLM_PROVIDER:-mock}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_TIMEOUT: ${GEMINI_TIMEOUT:-60s}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_TIMEOUT: ${DEEPSEEK_TIMEOUT:-120s}
      DEVCONTEXT_VECTOR_PROVIDER: ${DEVCONTEXT_VECTOR_PROVIDER:-qdrant}
      QDRANT_BASE_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_DISTANCE: ${QDRANT_DISTANCE:-Cosine}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-10s}
    volumes:
      - ./data/devcontext:/app/data
      - ${DEVCONTEXT_PROJECTS_DIR:-./workspace/projects}:/workspace/projects
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devcontext-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    container_name: devcontext-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
