services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18080:18080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlite:/app/data/devcontext.sqlite
      DEVCONTEXT_LLM_PROVIDER: ${DEVCONTEXT_LLM_PROVIDER:-mock}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_TIMEOUT: ${GEMINI_TIMEOUT:-60s}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_TIMEOUT: ${DEEPSEEK_TIMEOUT:-120s}
      DEVCONTEXT_VECTOR_PROVIDER: ${DEVCONTEXT_VECTOR_PROVIDER:-qdrant}
      QDRANT_BASE_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_DISTANCE: ${QDRANT_DISTANCE:-Cosine}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-10s}
    volumes:
      - ./data/devcontext:/app/data
      - ${DEVCONTEXT_PROJECTS_DIR:-./workspace/projects}:/workspace/projects
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18080/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.18.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: >
        timeout 5 bash -ec 'exec 3<>/dev/tcp/127.0.0.1/6333;
        printf "GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3;
        grep -q "200 OK" <&3'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
